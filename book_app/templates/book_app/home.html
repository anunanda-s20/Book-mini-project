{% extends 'book_app/base.html' %}
{% load static %}

{% block content %}

<!-- HERO SECTION -->
<div class="container-fluid">
    <div class="slider-area text-center py-5">
        <h1>Welcome to Our Book Store</h1>
        <p>Discover books across different genres and interests.</p>

        <!-- BOOK IMAGE -->
        <img src="{% static 'book_app/img/hero/book.jpg' %}"
             alt="Books"
             class="img-fluid mt-3">
    </div>
</div>

<!-- INTRO SECTION -->
<section class="collection section-bg2 section-padding30 section-over1 ml-15 mr-15"
         data-background="{% static 'book_app/img/hero/h1_hero1.png' %}">
    <div class="container text-center">
        <h2>Our Collection</h2>
        <p>
            This is a simple book store website built using Django.
            It displays books in a clean and easy-to-use layout.
        </p>
    </div>
</section>

{% endblock %}
