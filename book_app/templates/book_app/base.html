{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Mini Project</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Favicon -->
    <link rel="icon" href="{% static 'book_app/img/favicon.ico' %}">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'book_app/css/bootstrap.min.css' %}">

    <!-- Icons -->
    <link rel="stylesheet" href="{% static 'book_app/css/fontawesome.min.css' %}">

    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'book_app/style.css' %}">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            <img src="{% static 'book_app/img/logo/logo.png' %}" alt="Logo" height="30">
        </a>

        <button class="navbar-toggler" type="button" data-toggle="collapse"
                data-target="#mainNavbar" aria-controls="mainNavbar"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Page content -->
{% block content %}
{% endblock %}

<!-- Footer -->
<footer class="bg-dark text-light pt-4 pb-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2025 Book Mini Project</p>
    </div>
</footer>

<!-- JavaScript -->
<script src="{% static 'book_app/js/jquery.min.js' %}"></script>
<script src="{% static 'book_app/js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'book_app/js/main.js' %}"></script>

</body>
</html>
