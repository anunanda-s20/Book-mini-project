{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h4 class="text-center mb-4">
                        Set New Password
                    </h4>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            {{ form.new_password1.label_tag }}
                            {{ form.new_password1 }}
                        </div>

                        <div class="mb-3">
                            {{ form.new_password2.label_tag }}
                            {{ form.new_password2 }}
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">
                                Change Password
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
