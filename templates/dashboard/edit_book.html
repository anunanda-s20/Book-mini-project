{% extends 'dashboard/base_dashboard.html' %}

{% block content %}
<div class="container my-4" style="max-width: 800px;">

    <h2 class="dashboard-page-title mb-4">Edit Book - {{ book.title }}</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        {{ form.as_p }}

        <!-- Existing Images Preview -->
        {% if book.images.all %}
        <div class="mb-3">
            <label class="form-label">Existing Images</label>
            <div id="existingImagesCarousel" class="carousel slide mb-2" data-bs-ride="carousel">
                <div class="carousel-inner">
                    {% for image in book.images.all %}
                    <div class="carousel-item {% if forloop.first %}active{% endif %}">
                        <img src="{{ image.image.url }}" class="d-block mx-auto" style="max-height:300px;" alt="Book Image">
                    </div>
                    {% endfor %}
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#existingImagesCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#existingImagesCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>
        {% endif %}

        <!-- Add New Images -->
        <div class="mb-3">
            <label for="id_images" class="form-label">Add New Images</label>
            <input type="file" name="images" id="id_images" class="form-control" multiple>
            <small class="text-muted">Select new images to add to this book</small>
        </div>

        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'manage_books' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
