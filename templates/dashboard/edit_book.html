{% extends 'base.html' %}

{% block content %}
<h2>Edit Book</h2>

<form method="post" class="mt-3">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        Update Book
    </button>

    <a href="{% url 'manage_books' %}" class="btn btn-secondary">
        Cancel
    </a>
</form>
{% endblock %}
