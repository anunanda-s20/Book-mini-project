{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Luna Books</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{% static 'book_app/img/favicon.ico' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'book_app/style.css' %}">

    <style>
        body {
            background-color: #f6f8fb;
        }

        /* ===== DASHBOARD HEADER ===== */
        .dashboard-header {
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
            padding: 1rem 0;
        }

        
        /* ===== DASHBOARD NAV BUTTONS ===== */
        .dashboard-nav .nav-btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background-color: #f8f9fa;
            color: #343a40;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-right: 8px;
        }

        .dashboard-nav .nav-btn:hover {
            background-color: #e9ecef;
            color: #6f42c1;
            border-color: #6f42c1;
        }


        .footer-bottom-area {
    background: #e5e5e5;
    padding: 15px 0;
    font-size: 14px;
}
    </style>
</head>

<body>

<!-- ================= DASHBOARD HEADER ================= -->
<header class="dashboard-header">
    <div class="container d-flex justify-content-between align-items-center">

        <h2 class="page-title dashboard-title">Admin Dashboard📊 </h2>

        <nav class="dashboard-nav d-flex align-items-center">

            <a href="{% url 'dashboard' %}" class="nav-btn">
                <i class="fa-solid fa-house me-1"></i> Dashboard
            </a>

            <a href="{% url 'manage_books' %}" class="nav-btn">
                <i class="fa-solid fa-book me-1"></i> Manage Books
            </a>

            <a href="{% url 'home' %}" class="nav-btn">
                <i class="fa-solid fa-arrow-left me-1"></i> Back to Site
            </a>

            <!-- Small Logout Button -->
            <form method="post" action="{% url 'logout' %}" class="ms-2">
                {% csrf_token %}
                <button class="btn btn-sm btn-outline-danger px-2 py-1" title="Logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </form>

        </nav>
    </div>
</header>

<!-- ================= MESSAGES ================= -->
{% if messages %}
<div class="container mt-3">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
</div>
{% endif %}

<!-- ================= CONTENT ================= -->
<main class="container mt-4 mb-5">
    {% block content %}{% endblock %}
</main>

<!-- ================= FOOTER ================= -->
<footer>
    <div class="footer-bottom-area text-center">
        <p class="mb-0">&copy; 2025 Luna Books.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
