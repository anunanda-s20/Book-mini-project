{% extends 'dashboard/base_dashboard.html' %}

{% block content %}
<div class="container my-4" style="max-width: 800px;">

    <h2 class="dashboard-page-title mb-4">Add New Book</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        {{ form.as_p }}

        <!-- Multiple Images -->
        <div class="mb-3">
            <label for="id_images" class="form-label">Book Images</label>
            <input type="file" name="images" id="id_images" class="form-control" multiple>
            <small class="text-muted">You can upload multiple images</small>
        </div>

        <button type="submit" class="btn btn-success">Add Book</button>
        <a href="{% url 'manage_books' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
