{% extends 'base.html' %}

{% block content %}
<h2>My Wishlist</h2>

{% if items %}
    <ul>
        {% for item in items %}
            <li>
                {{ item.book.title }} – ₹{{ item.book.price }}
                <a href="{% url 'remove_from_wishlist' item.book.id %}">Remove</a>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>Your wishlist is empty.</p>
{% endif %}

{% endblock %}
