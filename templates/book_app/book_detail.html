{% extends 'base.html' %}

{% block content %}

<div class="book-detail-container" style="padding: 20px; max-width: 800px; margin: auto;">

    <!-- Book Title -->
    <h1>{{ book.title }}</h1>

    <!-- Author Name -->
    <p><strong>Author:</strong> {{ book.author }}</p>

    <!-- Description -->
    <p>{{ book.description }}</p>

    <!-- Price -->
    <p><strong>Price:</strong> ₹{{ book.price }}</p>

    <!-- Buy Button -->
    {% if user.is_authenticated %}
        <a href="{% url 'buy_book' book.id %}" class="btn btn-success">
            Buy Now
        </a>
    {% else %}
        <p>
            <a href="{% url 'login' %}">Login</a> to buy this book.
        </p>
    {% endif %}

    <!-- Optional Image -->
    {% if book.image %}
        <img src="{{ book.image.url }}" alt="{{ book.title }}" style="width:300px; display:block; margin-top:20px;">
    {% endif %}

</div>

{% endblock %}
