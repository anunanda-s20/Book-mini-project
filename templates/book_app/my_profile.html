{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>My Profile</h2>
    <hr>

    <!-- User Info -->
    <p><strong>Name:</strong> {{ user.username }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Phone:</strong> {{ profile.phone|default:"Not added" }}</p>

    <hr>

    <!-- Account Links -->
    <h3>My Account</h3>
    <ul>
        <li><a href="{% url 'my_orders' %}">📦 My Orders</a></li>
        <li><a href="{% url 'address_list' %}">📍 My Addresses</a></li>
        <li><a href="{% url 'wishlist' %}">❤️ My Wishlist</a></li>
    </ul>
</div>
{% endblock %}
