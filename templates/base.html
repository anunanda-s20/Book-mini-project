{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Book Mini Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Favicon -->
    <link rel="icon" href="{% static 'book_app/img/favicon.ico' %}">

    <!-- ✅ Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons (FontAwesome) -->
    <link rel="stylesheet" href="{% static 'book_app/css/fontawesome.min.css' %}">

    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'book_app/style.css' %}">

    <style>
        /* ---------------------- */
        /* NAVBAR LINK COLORS */
        /* ---------------------- */
        .nav-link {
            color: #000 !important; /* black text for all nav links */
            padding: 0.5rem 1rem;
        }

        .nav-link:hover {
            color: #007bff !important; /* blue hover */
        }

        /* ---------------------- */
        /* BUTTON FIXES */
        /* ---------------------- */
        /* Keep Bootstrap default styling for buttons */
        button, .btn {
            cursor: pointer; /* pointer on hover */
        }

        /* Optional: small buttons for + / − */
        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }

        /* Ensure all text is visible */
        body, h1, h2, h3, p, a {
            color: #000; /* default black text */
        }
    </style>
</head>

<body>

<!-- ==================== NAVBAR ==================== -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="{% url 'home' %}">
            <img src="{% static 'book_app/img/logo/logo.png' %}" alt="Logo" height="30">
        </a>

        <!-- Mobile toggle button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNavbar" aria-controls="mainNavbar"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar links -->
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'book_list' %}">Books</a>
                </li>

                {% if user.is_authenticated %}
                    <!-- Greeting -->
                    <li class="nav-item">
                        <span class="nav-link">Hi, {{ user.username }}</span>
                    </li>

                    <!-- Logout button -->
                    <li class="nav-item">
                        <form method="post" action="{% url 'logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link nav-link">Logout</button>
                        </form>
                    </li>
                {% else %}
                    <!-- Login / Signup -->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'login' %}">Login</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'signup' %}">Signup</a>
                    </li>
                {% endif %}

            </ul>
        </div>
    </div>
</nav>

<!-- ==================== PAGE CONTENT ==================== -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- ==================== FOOTER ==================== -->
<footer class="bg-dark text-light pt-4 pb-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2025 Book Mini Project</p>
    </div>
</footer>

<!-- ==================== BOOTSTRAP JS ==================== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
